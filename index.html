<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notes</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

/* ════ THEMES ════ */
:root {
  --bg:#F7F4EF; --bg2:#EDE9E2; --surface:#FFFFFF; --surface2:#F2EFE9;
  --border:rgba(0,0,0,0.08); --text:#1C1916; --text2:#7A7470; --text3:#A89E98;
  --accent:#C8865A; --accent2:#B56F43; --btn-fg:#FFFFFF; --del:#D4685C;
  --muted:#A89E98; --glow:transparent;
  --T:0.35s cubic-bezier(0.4,0,0.2,1);
  --font-display:'Lora',Georgia,serif;
  --font-mono:'Share Tech Mono',monospace;
}
[data-theme="ash"]     { --bg:#F0F2F5;--bg2:#E4E7EC;--surface:#FFF;--surface2:#EAEDF1;--border:rgba(0,0,0,0.07);--text:#1A1D23;--text2:#6B717D;--text3:#9BA3AF;--accent:#5B7CE6;--accent2:#4568D4;--btn-fg:#FFF;--del:#E05C6A;--muted:#9BA3AF; }
[data-theme="midnight"]{ --bg:#141414;--bg2:#1E1E1E;--surface:#242424;--surface2:#1A1A1A;--border:rgba(255,255,255,0.07);--text:#F0EDEA;--text2:#7A7875;--text3:#5A5855;--accent:#E8D5B0;--accent2:#D4BC90;--btn-fg:#1C1916;--del:#C06060;--muted:#7A7875; }
[data-theme="sage"]    { --bg:#EEF2EC;--bg2:#E2E9DE;--surface:#F8FAF7;--surface2:#E8EDE5;--border:rgba(0,0,0,0.07);--text:#1A2018;--text2:#657060;--text3:#96A490;--accent:#5C8B52;--accent2:#487040;--btn-fg:#FFF;--del:#C25C50;--muted:#96A490; }
[data-theme="dusk"]    { --bg:#1C1612;--bg2:#241E18;--surface:#2C2420;--surface2:#201A16;--border:rgba(255,255,255,0.08);--text:#F2EAE0;--text2:#8A7A6A;--text3:#6A5A4A;--accent:#E8A060;--accent2:#D08840;--btn-fg:#1C1612;--del:#D05848;--muted:#8A7A6A; }
[data-theme="bw"]      { --bg:#0a0a0a;--bg2:#1a1a1a;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.07);--text:#efefef;--text2:#888;--text3:#555;--accent:#fff;--accent2:#ccc;--btn-fg:#000;--del:#f55;--muted:#444; }
[data-theme="indigo"]  { --bg:#0c0d18;--bg2:#14163a;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.07);--text:#efefef;--text2:#9b8eff;--text3:#6655c8;--accent:#7c6ff7;--accent2:#5040a8;--btn-fg:#fff;--del:#f55;--muted:#444;--glow:rgba(124,111,247,0.12); }
[data-theme="cyber"]   { --bg:#040a06;--bg2:#001a0a;--surface:rgba(255,255,255,0.03);--surface2:rgba(0,255,136,0.05);--border:rgba(0,255,136,0.08);--text:#efefef;--text2:#00cc55;--text3:#007a30;--accent:#00ff88;--accent2:#00cc55;--btn-fg:#000;--del:#f55;--muted:#444;--glow:rgba(0,255,136,0.10); }
[data-theme="nothing"] { --bg:#000;--bg2:#0d0000;--surface:rgba(255,255,255,0.02);--surface2:rgba(255,30,30,0.04);--border:rgba(255,0,0,0.12);--text:#f0f0f0;--text2:#888;--text3:#555;--accent:#ff3333;--accent2:#cc0000;--btn-fg:#fff;--del:#ff3333;--muted:#3a3a3a;--glow:rgba(255,30,30,0.08); }

/* ════ BASE ════ */
html,body { height:100%; }
body {
  font-family: var(--font-mono);
  background: var(--bg);
  color: var(--text);
  min-height:100%;
  overflow-x:hidden;
  -webkit-user-select:none;
  user-select:none;
  transition: background var(--T), color var(--T);
  position:relative;
  padding-bottom: 80px;
}
input,textarea,[contenteditable] { -webkit-user-select:text; user-select:text; }

body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(ellipse 70% 40% at 50% 0%, var(--glow), transparent 65%);
  pointer-events:none; z-index:0; transition:background var(--T);
}
[data-theme="nothing"]::after {
  content:''; position:fixed; inset:0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size:20px 20px; pointer-events:none; z-index:0;
}

.wrap { max-width:560px; margin:0 auto; position:relative; z-index:1; }

/* ════ THEME BAR ════ */
.theme-bar {
  display:flex; align-items:center; justify-content:flex-end;
  gap:6px; padding:14px 20px 10px; flex-wrap:wrap;
}
#storageInd {
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em;
  margin-right:auto; opacity:0.55;
}
.th-btn {
  width:22px; height:22px; border-radius:50%;
  border:2px solid transparent; cursor:pointer; flex-shrink:0;
  transition:transform 0.18s, box-shadow 0.18s; position:relative;
}
.th-btn:hover { transform:scale(1.18); }
.th-btn.active { box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }
.th-btn[data-theme="default"]  { background:#C8865A; }
.th-btn[data-theme="ash"]      { background:#5B7CE6; }
.th-btn[data-theme="midnight"] { background:#242424; border-color:rgba(200,200,200,0.25); }
.th-btn[data-theme="sage"]     { background:#5C8B52; }
.th-btn[data-theme="dusk"]     { background:#E8A060; }
.th-btn[data-theme="bw"]       { background:#fff; border-color:#555; }
.th-btn[data-theme="indigo"]   { background:#7c6ff7; }
.th-btn[data-theme="cyber"]    { background:#00ff88; }
.th-btn[data-theme="nothing"]  { background:#000; border-color:#ff1e1e !important; }
.th-btn[data-theme="nothing"]::after { content:''; position:absolute; inset:3px; border-radius:50%; border:1px solid #ff1e1e; }
.th-divider { width:1px; height:16px; background:var(--border); margin:0 2px; flex-shrink:0; }

/* ════ SECTION TABS ════ */
.section-tabs {
  display:flex; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:var(--bg); z-index:10;
  transition:background var(--T), border-color var(--T);
}
.s-tab {
  flex:1; padding:15px 0;
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--muted); background:none; border:none; cursor:pointer;
  transition:color var(--T); position:relative;
}
.s-tab::after {
  content:''; position:absolute; bottom:-1px; left:25%; width:50%; height:1px;
  background:var(--accent); transform:scaleX(0); transition:transform var(--T), background var(--T);
}
.s-tab.active { color:var(--text); }
.s-tab.active::after { transform:scaleX(1); }

.section { display:none; padding:24px 20px; }
.section.active { display:block; }

/* ════ NOTES ════ */

/* list view */
.notes-list { display:flex; flex-direction:column; gap:10px; }
.note-card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; cursor:pointer;
  transition:box-shadow 0.2s, background var(--T), border-color var(--T);
  animation: fadeUp 0.2s ease;
}
.note-card:hover { box-shadow:0 3px 14px rgba(0,0,0,0.07); }
.note-card-title {
  font-family:var(--font-display); font-size:15px; font-weight:600;
  color:var(--text); margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.note-card-preview {
  font-size:12px; color:var(--text3); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.note-card-date { font-family:var(--font-mono); font-size:9px; color:var(--text3); margin-top:8px; letter-spacing:0.1em; }

.new-note-btn {
  width:100%; padding:12px; margin-bottom:18px;
  background:var(--accent); color:var(--btn-fg);
  border:none; border-radius:12px;
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
  cursor:pointer; transition:background var(--T), transform 0.15s;
}
.new-note-btn:hover { background:var(--accent2); transform:translateY(-1px); }

/* editor view */
.editor-view { display:none; }
.editor-view.active { display:block; }
.notes-list-view.hidden { display:none; }

.editor-topbar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:16px; padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.back-btn {
  background:none; border:none; color:var(--text2); cursor:pointer;
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
  padding:4px 0; flex-shrink:0; transition:color 0.2s;
}
.back-btn:hover { color:var(--text); }
.editor-actions { display:flex; gap:6px; margin-left:auto; }
.del-note-btn {
  background:none; border:1px solid var(--border); color:var(--del);
  padding:5px 12px; border-radius:8px; cursor:pointer;
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
  transition:background 0.18s;
}
.del-note-btn:hover { background:var(--bg2); }
.save-note-btn {
  background:var(--accent); color:var(--btn-fg); border:none;
  padding:5px 14px; border-radius:8px; cursor:pointer;
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
  transition:background var(--T);
}
.save-note-btn:hover { background:var(--accent2); }

.note-title-input {
  width:100%; background:transparent; border:none; outline:none;
  font-family:var(--font-display); font-size:22px; font-weight:600;
  color:var(--text); margin-bottom:12px;
  caret-color:var(--accent);
}
.note-title-input::placeholder { color:var(--text3); opacity:0.5; }

/* format toolbar */
.fmt-bar {
  display:flex; gap:4px; flex-wrap:wrap;
  padding:8px 0 10px; margin-bottom:10px;
  border-bottom:1px solid var(--border);
}
.fmt-btn {
  background:var(--surface2); border:none; color:var(--text2);
  width:32px; height:32px; border-radius:8px; cursor:pointer;
  font-size:13px; display:flex; align-items:center; justify-content:center;
  transition:background 0.15s, color 0.15s;
  font-family:var(--font-display);
}
.fmt-btn:hover { background:var(--bg2); color:var(--text); }
.fmt-btn.active { background:var(--accent); color:var(--btn-fg); }
.fmt-btn b { font-weight:700; }
.fmt-btn i { font-style:italic; }

.note-body {
  width:100%; min-height:260px; background:transparent;
  border:none; outline:none; resize:none;
  font-family:var(--font-mono); font-size:14px; line-height:1.9;
  color:var(--text); caret-color:var(--accent);
}
.note-body::placeholder { color:var(--text3); opacity:0.4; }

/* rich note display in card uses these */
.note-body-display { font-size:14px; line-height:1.8; color:var(--text2); white-space:pre-wrap; word-break:break-word; }
.note-body-display h2 { font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--text); margin:8px 0 4px; }
.note-body-display h3 { font-family:var(--font-display); font-size:15px; font-weight:600; color:var(--text); margin:6px 0 3px; }
.note-body-display strong { font-weight:700; color:var(--text); }
.note-body-display em { font-style:italic; }
.note-body-display s { opacity:0.5; }
.note-body-display a { color:var(--accent); text-decoration:underline; }
.note-body-display hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

.char-ct-note { font-family:var(--font-mono); font-size:9px; color:var(--text3); text-align:right; margin-top:6px; }

.empty-notes { text-align:center; padding:60px 20px; }
.empty-notes-icon { font-size:2.4em; margin-bottom:12px; }
.empty-notes h3 { font-family:var(--font-display); font-size:16px; color:var(--text2); font-weight:400; margin-bottom:6px; }
.empty-notes p  { font-size:11px; color:var(--text3); letter-spacing:0.08em; }

/* ════ TODO — LISTS VIEW ════ */
.lists-topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.lists-title { font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--text); }
.new-list-btn {
  padding:8px 14px; border:none; border-radius:10px;
  background:var(--accent); color:var(--btn-fg);
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
  cursor:pointer; transition:background var(--T), transform 0.15s;
}
.new-list-btn:hover { background:var(--accent2); transform:translateY(-1px); }

.lists-grid { display:flex; flex-direction:column; gap:10px; }

.list-card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 16px; cursor:pointer;
  display:flex; align-items:center; gap:12px;
  transition:box-shadow 0.2s, background var(--T), border-color var(--T);
  animation:fadeUp 0.18s ease;
}
.list-card:hover { box-shadow:0 3px 14px rgba(0,0,0,0.07); }
.list-card-info { flex:1; min-width:0; }
.list-card-name {
  font-family:var(--font-display); font-size:15px; font-weight:600; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.list-card-meta { font-family:var(--font-mono); font-size:10px; color:var(--text3); margin-top:3px; letter-spacing:0.06em; }
.list-card-del {
  background:none; border:none; color:var(--text3); font-size:17px;
  cursor:pointer; padding:4px; flex-shrink:0; opacity:0; transition:opacity 0.15s, color 0.15s;
}
.list-card:hover .list-card-del { opacity:1; }
.list-card-del:hover { color:var(--del); }

/* ── list detail view ── */
.list-detail-view { display:none; }
.list-detail-view.active { display:block; }
.lists-view.hidden { display:none; }
#listsView.hidden { display:none; }

.list-detail-topbar {
  display:flex; align-items:center; gap:10px;
  margin-bottom:18px; padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.list-back-btn {
  background:none; border:none; color:var(--text2); cursor:pointer;
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
  padding:4px 0; flex-shrink:0; transition:color 0.2s;
}
.list-back-btn:hover { color:var(--text); }
.list-detail-name {
  flex:1; font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--text);
  background:none; border:none; outline:none;
  -webkit-user-select:text; user-select:text;
}
.list-detail-name:focus { border-bottom:1px solid var(--accent); }

/* ── todo items (reused in list detail) ── */
.todo-add-row { display:flex; gap:8px; margin-bottom:20px; }
.todo-input {
  flex:1; padding:11px 14px;
  border:1.5px solid var(--border); border-radius:11px;
  background:var(--surface); color:var(--text);
  font-family:var(--font-mono); font-size:13px;
  outline:none; transition:border-color 0.2s;
}
.todo-input::placeholder { color:var(--text3); }
.todo-input:focus { border-color:var(--accent); }
.todo-add-btn {
  padding:11px 16px; border:none; border-radius:11px;
  background:var(--accent); color:var(--btn-fg);
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
  cursor:pointer; white-space:nowrap; transition:background var(--T), transform 0.15s;
}
.todo-add-btn:hover { background:var(--accent2); transform:translateY(-1px); }

.todo-section-lbl {
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px; margin-top:20px;
}
.todo-section-lbl:first-of-type { margin-top:0; }
.todo-list { display:flex; flex-direction:column; gap:6px; }

.todo-item {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:11px 14px;
  transition:background var(--T), border-color var(--T), opacity 0.25s;
  animation:fadeUp 0.18s ease;
}
.todo-item.done { opacity:0.5; }
.todo-check {
  width:20px; height:20px; border-radius:50%;
  border:1.5px solid var(--border); flex-shrink:0;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background var(--T), border-color var(--T);
}
.todo-item.done .todo-check { background:var(--accent); border-color:var(--accent); }
.todo-check-inner {
  width:8px; height:8px; border-radius:50%;
  background:var(--btn-fg); opacity:0; transform:scale(0);
  transition:opacity 0.2s, transform 0.2s;
}
.todo-item.done .todo-check-inner { opacity:1; transform:scale(1); }
.todo-text {
  flex:1; font-family:var(--font-mono); font-size:13px; color:var(--text);
  line-height:1.4; word-break:break-word; background:none; border:none; outline:none;
  transition:color var(--T); -webkit-user-select:text; user-select:text;
}
.todo-item.done .todo-text { text-decoration:line-through; color:var(--text3); }
.todo-del {
  background:none; border:none; color:var(--text3); cursor:pointer;
  font-size:16px; line-height:1; padding:2px 4px; flex-shrink:0;
  opacity:0; transition:opacity 0.15s, color 0.15s;
}
.todo-item:hover .todo-del { opacity:1; }
.todo-del:hover { color:var(--del); }
.todo-clear-btn {
  width:100%; margin-top:16px; padding:9px;
  background:transparent; border:1px solid var(--border); border-radius:10px;
  color:var(--text3); font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; text-transform:uppercase;
  cursor:pointer; transition:background 0.18s, color 0.18s;
}
.todo-clear-btn:hover { background:var(--bg2); color:var(--del); }

/* modal for new list */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.45);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:500; opacity:0; pointer-events:none;
  transition:opacity 0.25s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal-sheet {
  background:var(--surface); border-radius:20px 20px 0 0;
  padding:24px 20px 36px; width:100%; max-width:560px;
  transform:translateY(40px); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), background var(--T);
}
.modal-overlay.show .modal-sheet { transform:translateY(0); }
.modal-title { font-family:var(--font-display); font-size:17px; font-weight:600; color:var(--text); margin-bottom:16px; }
.modal-row { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
.modal-input {
  flex:1; padding:11px 14px; border:1.5px solid var(--border); border-radius:11px;
  background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:14px;
  outline:none; transition:border-color 0.2s;
}
.modal-input:focus { border-color:var(--accent); }
.modal-confirm-btn {
  width:100%; padding:13px; border:none; border-radius:12px;
  background:var(--accent); color:var(--btn-fg);
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
  cursor:pointer; transition:background var(--T);
}
.modal-confirm-btn:hover { background:var(--accent2); }

.empty-lists { text-align:center; padding:60px 20px; }
.empty-lists-icon { font-size:2.4em; margin-bottom:12px; }
.empty-lists h3 { font-family:var(--font-display); font-size:16px; color:var(--text2); font-weight:400; margin-bottom:6px; }
.empty-lists p  { font-size:11px; color:var(--text3); letter-spacing:0.08em; }

.empty-todo { text-align:center; padding:50px 20px; }
.empty-todo-icon { font-size:2.2em; margin-bottom:10px; }
.empty-todo h3 { font-family:var(--font-display); font-size:15px; color:var(--text2); font-weight:400; margin-bottom:5px; }
.empty-todo p  { font-size:11px; color:var(--text3); letter-spacing:0.08em; }

/* ════ SHARED ════ */
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.divider { height:1px; background:var(--border); margin:20px 0; transition:background var(--T); }

.toast {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%) translateY(40px);
  background:var(--accent); color:var(--btn-fg);
  padding:9px 22px; font-family:var(--font-mono); font-size:9px; letter-spacing:0.18em; text-transform:uppercase;
  opacity:0; transition:transform 0.3s, opacity 0.3s; pointer-events:none; z-index:200; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* loading */
#loadingOverlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10000; gap:14px; transition:background var(--T); }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .85s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
#loadingOverlay p { font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; color:var(--text3); }

@media(max-width:480px){
  .section { padding:20px 16px; }
  .theme-bar { padding:12px 16px 8px; }
}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>loading…</p>
</div>

<div class="toast" id="toast"></div>

<div class="wrap">

  <!-- THEME BAR -->
  <div class="theme-bar">
    <span id="storageInd"></span>
    <div class="th-btn active" data-theme="default"  onclick="setTheme('default')"></div>
    <div class="th-btn"        data-theme="ash"       onclick="setTheme('ash')"></div>
    <div class="th-btn"        data-theme="sage"      onclick="setTheme('sage')"></div>
    <div class="th-divider"></div>
    <div class="th-btn"        data-theme="midnight"  onclick="setTheme('midnight')"></div>
    <div class="th-btn"        data-theme="dusk"      onclick="setTheme('dusk')"></div>
    <div class="th-btn"        data-theme="bw"        onclick="setTheme('bw')"></div>
    <div class="th-btn"        data-theme="indigo"    onclick="setTheme('indigo')"></div>
    <div class="th-btn"        data-theme="cyber"     onclick="setTheme('cyber')"></div>
    <div class="th-btn"        data-theme="nothing"   onclick="setTheme('nothing')"></div>
  </div>

  <!-- SECTION TABS -->
  <nav class="section-tabs">
    <button class="s-tab active" data-sec="notes" onclick="switchSection('notes')">notes</button>
    <button class="s-tab"        data-sec="todo"  onclick="switchSection('todo')">to-do</button>
  </nav>

  <!-- ══ NOTES SECTION ══ -->
  <div class="section active" id="sec-notes">

    <!-- list view -->
    <div id="notesListView">
      <button class="new-note-btn" onclick="openNewNote()">+ new note</button>
      <div class="notes-list" id="notesList"></div>
    </div>

    <!-- editor view -->
    <div class="editor-view" id="editorView">
      <div class="editor-topbar">
        <button class="back-btn" onclick="closeEditor()">← back</button>
        <div class="editor-actions">
          <button class="del-note-btn" onclick="deleteCurrentNote()">delete</button>
          <button class="save-note-btn" onclick="saveCurrentNote()">save</button>
        </div>
      </div>

      <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Title…" maxlength="80">

      <!-- format toolbar -->
      <div class="fmt-bar">
        <button class="fmt-btn" onclick="fmt('bold')"          title="Bold"><b>B</b></button>
        <button class="fmt-btn" onclick="fmt('italic')"        title="Italic"><i>I</i></button>
        <button class="fmt-btn" onclick="fmt('strikethrough')" title="Strike"><s>S</s></button>
        <button class="fmt-btn" onclick="fmtHeading('## ')"    title="Heading">H1</button>
        <button class="fmt-btn" onclick="fmtHeading('### ')"   title="Subheading">H2</button>
        <button class="fmt-btn" onclick="fmtLine('--- ')"      title="Divider">—</button>
      </div>

      <textarea class="note-body" id="noteBody" placeholder="Start writing…" rows="14"
        oninput="updateCharCount()"></textarea>
      <div class="char-ct-note" id="noteCharCount">0 chars</div>
    </div>

  </div>

  <!-- ══ TODO SECTION ══ -->
  <div class="section" id="sec-todo">

    <!-- lists overview -->
    <div id="listsView">
      <div class="lists-topbar">
        <span class="lists-title">my lists</span>
        <button class="new-list-btn" onclick="openNewListModal()">+ new list</button>
      </div>
      <div class="lists-grid" id="listsGrid"></div>
    </div>

    <!-- list detail -->
    <div class="list-detail-view" id="listDetailView">
      <div class="list-detail-topbar">
        <button class="list-back-btn" onclick="closeListDetail()">← lists</button>
        <input class="list-detail-name" id="listDetailName" maxlength="40"
          onblur="renameCurrentList()" onkeypress="if(event.key==='Enter')this.blur()">
      </div>
      <div class="todo-add-row">
        <input type="text" class="todo-input" id="todoInput" placeholder="Add item…" maxlength="120">
        <button class="todo-add-btn" onclick="addTodo()">+ add</button>
      </div>
      <div id="todoContent"></div>
    </div>

  </div>

  <!-- new list modal -->
  <div class="modal-overlay" id="newListModal" onclick="closeModalOutside(event)">
    <div class="modal-sheet">
      <div class="modal-title">new list</div>
      <div class="modal-row">
        <input class="modal-input" id="newListName" placeholder="List name…" maxlength="40"
          onkeypress="if(event.key==='Enter')confirmNewList()">
      </div>
      <button class="modal-confirm-btn" onclick="confirmNewList()">create list</button>
    </div>
  </div>

</div><!-- /wrap -->

<script>
/* ════ TG INIT ════ */
const TG = window.Telegram?.WebApp;
if (TG) { TG.expand(); TG.ready(); }
const isTG = !!(TG?.CloudStorage);

/* ════ STORAGE ════ */
const CK_NOTES = 'notes_v1';
const CK_TODOS = 'todos_v1';
const CK_SETT  = 'notes_settings_v1';
const CHUNK    = 3900;

const LS = {
  get(k)  { try{return localStorage.getItem(k);}catch{return null;} },
  set(k,v){ try{localStorage.setItem(k,v);}catch{} }
};

function chunkStr(s){ const r=[]; for(let i=0;i<s.length;i+=CHUNK) r.push(s.slice(i,i+CHUNK)); return r; }

function cloudSet(base, val){
  return new Promise((res,rej)=>{
    if(!TG?.CloudStorage){rej(new Error('no cloud'));return;}
    const chunks=chunkStr(val);
    TG.CloudStorage.setItem(base+'_meta', JSON.stringify({chunks:chunks.length}), err=>{
      if(err){rej(err);return;}
      if(!chunks.length){res();return;}
      let left=chunks.length;
      chunks.forEach((c,i)=>TG.CloudStorage.setItem(base+'_'+i, c, e2=>{
        if(e2){rej(e2);return;}
        if(--left===0) res();
      }));
    });
  });
}

function cloudGet(base){
  return new Promise((res,rej)=>{
    if(!TG?.CloudStorage){rej(new Error('no cloud'));return;}
    TG.CloudStorage.getItem(base+'_meta',(err,raw)=>{
      if(err||!raw){res(null);return;}
      let meta; try{meta=JSON.parse(raw);}catch{res(null);return;}
      const n=meta.chunks||0; if(!n){res('');return;}
      const keys=Array.from({length:n},(_,i)=>base+'_'+i);
      TG.CloudStorage.getItems(keys,(e2,vals)=>{
        if(e2){rej(e2);return;}
        res(keys.map(k=>vals[k]||'').join(''));
      });
    });
  });
}

/* ════ THEME ════ */
let currentTheme = 'default';

function setTheme(t, save=true){
  currentTheme = t;
  if(t==='default') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.th-btn').forEach(b=>b.classList.toggle('active', b.dataset.theme===t));
  if(save) persist();
}

/* ════ STATE ════ */
let notes = [];   // [{id, title, body, updatedAt}]
let lists = [];   // [{id, name, icon, items:[{id,text,done}]}]
let editingId = null;
let saveTimer = null;

function persist(){
  const s = JSON.stringify({theme:currentTheme});
  LS.set(CK_SETT, s);
  LS.set(CK_NOTES, JSON.stringify(notes));
  LS.set(CK_TODOS, JSON.stringify(lists));
  if(!isTG) return;
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    try{
      await Promise.all([
        cloudSet(CK_NOTES, JSON.stringify(notes)),
        cloudSet(CK_TODOS, JSON.stringify(lists)),
        cloudSet(CK_SETT,  JSON.stringify({theme:currentTheme}))
      ]);
    }catch(e){ console.error(e); }
  }, 900);
}

/* ════ SECTION SWITCH ════ */
function switchSection(name){
  document.querySelectorAll('.s-tab').forEach(t=>t.classList.toggle('active', t.dataset.sec===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active', s.id==='sec-'+name));
  if(name==='todo') renderLists();
  if(name==='notes') renderNotesList();
}

/* ════════════════════════════
   NOTES
════════════════════════════ */
function renderNotesList(){
  const list = document.getElementById('notesList');
  const sorted = [...notes].sort((a,b)=>b.updatedAt-a.updatedAt);
  if(!sorted.length){
    list.innerHTML=`<div class="empty-notes"><div class="empty-notes-icon">📝</div><h3>No notes yet</h3><p>tap + new note to start</p></div>`;
    return;
  }
  list.innerHTML = sorted.map(n=>{
    const preview = n.body.replace(/[#\-*_~]/g,'').slice(0,80);
    const date    = fmtDate(n.updatedAt);
    return `<div class="note-card" onclick="openNote('${n.id}')">
      <div class="note-card-title">${esc(n.title||'Untitled')}</div>
      <div class="note-card-preview">${esc(preview)}</div>
      <div class="note-card-date">${date}</div>
    </div>`;
  }).join('');
}

function openNewNote(){
  editingId = 'new_' + Date.now();
  document.getElementById('noteTitleInput').value = '';
  document.getElementById('noteBody').value = '';
  document.getElementById('noteCharCount').textContent = '0 chars';
  showEditor();
}

function openNote(id){
  const n = notes.find(n=>n.id===id);
  if(!n) return;
  editingId = id;
  document.getElementById('noteTitleInput').value = n.title||'';
  document.getElementById('noteBody').value = n.body||'';
  updateCharCount();
  showEditor();
}

function showEditor(){
  document.getElementById('notesListView').style.display = 'none';
  document.getElementById('editorView').style.display    = 'block';
  setTimeout(()=>document.getElementById('noteBody').focus(), 100);
}

function closeEditor(){
  document.getElementById('notesListView').style.display = '';
  document.getElementById('editorView').style.display    = 'none';
  editingId = null;
  renderNotesList();
}

function saveCurrentNote(){
  const title = document.getElementById('noteTitleInput').value.trim();
  const body  = document.getElementById('noteBody').value;
  if(!title && !body.trim()){ showToast('nothing to save'); return; }

  if(editingId && editingId.startsWith('new_')){
    notes.push({ id: String(Date.now()), title, body, updatedAt: Date.now() });
  } else {
    const n = notes.find(n=>n.id===editingId);
    if(n){ n.title=title; n.body=body; n.updatedAt=Date.now(); }
  }
  persist();
  showToast('saved');
  closeEditor();
}

function deleteCurrentNote(){
  if(!editingId || editingId.startsWith('new_')){ closeEditor(); return; }
  if(!confirm('Delete this note?')) return;
  notes = notes.filter(n=>n.id!==editingId);
  persist();
  closeEditor();
}

function updateCharCount(){
  const n = document.getElementById('noteBody').value.length;
  document.getElementById('noteCharCount').textContent = n + ' chars';
}

/* ── FORMAT HELPERS ── */
function fmt(cmd){
  const ta = document.getElementById('noteBody');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.slice(start, end);
  const map = { bold:'**', italic:'_', strikethrough:'~~' };
  const m = map[cmd];
  if(!m) return;
  const wrapped = m + sel + m;
  ta.setRangeText(wrapped, start, end, 'select');
  ta.focus();
  updateCharCount();
}

function fmtHeading(prefix){
  const ta = document.getElementById('noteBody');
  const start = ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', start-1)+1;
  const line = ta.value.slice(lineStart, start);
  // toggle: remove prefix if already there
  if(line.startsWith(prefix)){
    ta.setRangeText('', lineStart, lineStart+prefix.length, 'end');
  } else {
    ta.setRangeText(prefix, lineStart, lineStart, 'end');
  }
  ta.focus(); updateCharCount();
}

function fmtLine(str){
  const ta = document.getElementById('noteBody');
  const pos = ta.selectionStart;
  const ins = '\n'+str+'\n';
  ta.setRangeText(ins, pos, pos, 'end');
  ta.focus(); updateCharCount();
}

/* ════════════════════════════
   TODO — LISTS
   lists: [{id, name, icon, items:[{id,text,done}]}]
════════════════════════════ */
const EMOJIS = [];
let currentListId = null;

function renderLists(){
  const grid = document.getElementById('listsGrid');
  if(!lists.length){
    grid.innerHTML=`<div class="empty-lists"><div class="empty-lists-icon">📋</div><h3>No lists yet</h3><p>tap + new list to create one</p></div>`;
    return;
  }
  grid.innerHTML = lists.map(l=>{
    const total = l.items.length;
    const done  = l.items.filter(i=>i.done).length;
    const meta  = total ? `${done}/${total} done` : 'empty';
    return `<div class="list-card" onclick="openList('${l.id}')">
      <div class="list-card-info">
        <div class="list-card-name">${esc(l.name)}</div>
        <div class="list-card-meta">${meta}</div>
      </div>
      <button class="list-card-del" onclick="deleteList(event,'${l.id}')">×</button>
    </div>`;
  }).join('');
}

function openList(id){
  currentListId = id;
  const l = lists.find(l=>l.id===id);
  if(!l) return;
  document.getElementById('listDetailName').value = l.name;
  document.getElementById('listsView').classList.add('hidden');
  document.getElementById('listDetailView').classList.add('active');
  document.getElementById('todoInput').value = '';
  renderTodos();
  setTimeout(()=>document.getElementById('todoInput').focus(), 80);
}

function closeListDetail(){
  currentListId = null;
  document.getElementById('listDetailView').classList.remove('active');
  document.getElementById('listsView').classList.remove('hidden');
  renderLists();
}

function renameCurrentList(){
  const l = lists.find(l=>l.id===currentListId);
  if(!l) return;
  const val = document.getElementById('listDetailName').value.trim();
  if(val) { l.name=val; persist(); }
}

function deleteList(e, id){
  e.stopPropagation();
  if(!confirm('Delete this list?')) return;
  lists = lists.filter(l=>l.id!==id);
  persist(); renderLists();
}

/* ── new list modal ── */
function openNewListModal(){
  document.getElementById('newListName').value = '';
  document.getElementById('newListModal').classList.add('show');
  setTimeout(()=>document.getElementById('newListName').focus(), 200);
}

function closeModal(){
  document.getElementById('newListModal').classList.remove('show');
}

function closeModalOutside(e){
  if(e.target===document.getElementById('newListModal')) closeModal();
}

function confirmNewList(){
  const name = document.getElementById('newListName').value.trim();
  if(!name){ document.getElementById('newListName').focus(); return; }
  lists.push({ id:String(Date.now()), name, items:[] });
  persist(); closeModal(); renderLists();
}

/* ── items ── */
function addTodo(){
  const inp = document.getElementById('todoInput');
  const text = inp.value.trim();
  if(!text || !currentListId) return;
  const l = lists.find(l=>l.id===currentListId);
  if(!l) return;
  l.items.unshift({ id:String(Date.now()), text, done:false });
  inp.value = '';
  persist(); renderTodos();
}

function toggleTodo(id){
  const l = lists.find(l=>l.id===currentListId);
  if(!l) return;
  const t = l.items.find(t=>t.id===id);
  if(t){ t.done=!t.done; persist(); renderTodos(); }
}

function deleteTodo(id){
  const l = lists.find(l=>l.id===currentListId);
  if(!l) return;
  l.items = l.items.filter(t=>t.id!==id);
  persist(); renderTodos();
}

function clearDone(){
  const l = lists.find(l=>l.id===currentListId);
  if(!l) return;
  l.items = l.items.filter(t=>!t.done);
  persist(); renderTodos();
}

function renderTodos(){
  const container = document.getElementById('todoContent');
  const l = lists.find(l=>l.id===currentListId);
  if(!l){ container.innerHTML=''; return; }

  const active = l.items.filter(t=>!t.done);
  const done   = l.items.filter(t=>t.done);

  if(!l.items.length){
    container.innerHTML=`<div class="empty-todo"><div class="empty-todo-icon">✓</div><h3>List is empty</h3><p>add your first item above</p></div>`;
    return;
  }

  let html='';
  if(active.length){
    html+=`<div class="todo-section-lbl">${active.length} item${active.length!==1?'s':''}</div><div class="todo-list">`;
    active.forEach(t=>{ html+=todoHTML(t); });
    html+='</div>';
  }
  if(done.length){
    html+=`<div class="todo-section-lbl">done · ${done.length}</div><div class="todo-list">`;
    done.forEach(t=>{ html+=todoHTML(t); });
    html+=`</div><button class="todo-clear-btn" onclick="clearDone()">clear done</button>`;
  }
  container.innerHTML = html;
}

function todoHTML(t){
  return `<div class="todo-item ${t.done?'done':''}">
    <div class="todo-check" onclick="toggleTodo('${t.id}')"><div class="todo-check-inner"></div></div>
    <div class="todo-text">${esc(t.text)}</div>
    <button class="todo-del" onclick="deleteTodo('${t.id}')">×</button>
  </div>`;
}

/* ════ UTILS ════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts){
  const d=new Date(ts), now=new Date();
  if(d.toDateString()===now.toDateString()) return 'today '+d.toTimeString().slice(0,5);
  const diff=Math.floor((now-d)/86400000);
  if(diff===1) return 'yesterday';
  if(diff<7) return diff+' days ago';
  return d.getDate()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getFullYear();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

/* ════ KEYBOARD ════ */
document.getElementById('todoInput').addEventListener('keypress',e=>{if(e.key==='Enter')addTodo();});

/* ════ BOOT ════ */
(async()=>{
  // storage indicator
  const ind = document.getElementById('storageInd');
  if(isTG){ ind.textContent='☁ cloud'; ind.style.color='#5C8B52'; }
  else    { ind.textContent='⚠ local';  ind.style.color='#E8A060'; }

  // load settings
  let settRaw = null;
  if(isTG){ try{ settRaw=await cloudGet(CK_SETT); }catch{} }
  if(!settRaw) settRaw = LS.get(CK_SETT);
  if(settRaw){ try{ const s=JSON.parse(settRaw); if(s.theme) currentTheme=s.theme; }catch{} }

  // load notes
  let notesRaw = null;
  if(isTG){ try{ notesRaw=await cloudGet(CK_NOTES); }catch{} }
  if(!notesRaw) notesRaw = LS.get(CK_NOTES);
  if(notesRaw){ try{ notes=JSON.parse(notesRaw); }catch{} }

  // load todos/lists
  let todosRaw = null;
  if(isTG){ try{ todosRaw=await cloudGet(CK_TODOS); }catch{} }
  if(!todosRaw) todosRaw = LS.get(CK_TODOS);
  if(todosRaw){ try{ lists=JSON.parse(todosRaw); }catch{} }

  setTheme(currentTheme, false);
  renderNotesList();
  renderLists();

  document.getElementById('loadingOverlay').style.display='none';
})();
</script>
</body>
</html>
